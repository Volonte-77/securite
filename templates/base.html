<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestion des étudiants{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --orange-1: #ff7a18;
            --orange-2: #ff9b4a;
            --orange-3: #ff5f20;
            --bg-dark: #071028;
            --text: #eff6ff;
            --muted: #b8c7d6;
            --focus: rgba(255, 140, 23, 0.18);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #071028 0%, #020416 60%);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: linear-gradient(90deg, rgba(8,12,25,0.7), rgba(10,16,30,0.55));
            border-bottom: 1px solid rgba(255,160,70,0.06);
            padding-top: 0.6rem;
            padding-bottom: 0.6rem;
        }

        .nav-link {
            font-weight: 600;
            color: var(--muted);
            transition: all .18s ease;
            padding: .5rem .8rem;
            border-radius: .5rem;
        }

        .nav-link:hover, .nav-link:focus {
            color: #fff;
            transform: translateY(-2px);
            background: linear-gradient(90deg, rgba(255,122,24,0.08), rgba(255,100,20,0.06));
            box-shadow: 0 6px 18px rgba(255,120,30,0.08);
        }

        .glass-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,150,45,0.06);
            border-radius: 1rem;
            box-shadow: 0 8px 24px rgba(2,6,23,0.6);
            backdrop-filter: blur(6px);
        }

        /* Global form styles for visibility */
        label { color: var(--orange-2); font-weight: 600; }
        input[type="text"], input[type="email"], textarea, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: .75rem;
            border: 1px solid rgba(255,150,45,0.12);
            background: rgba(8, 14, 30, 0.6);
            color: var(--text);
            outline: none;
            transition: box-shadow .15s ease, border-color .15s ease, transform .08s ease;
        }

        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.35); }

        input:focus, textarea:focus, select:focus {
            border-color: var(--orange-3);
            box-shadow: 0 6px 20px var(--focus);
            transform: translateY(-1px);
        }

        .btn-orange {
            background: linear-gradient(135deg, var(--orange-1), var(--orange-3));
            border: none;
            color: #fff;
            transition: transform .16s ease, box-shadow .16s ease, opacity .12s ease;
        }

        .btn-orange:active { transform: translateY(0); }

        .btn-outline-orange {
            color: var(--orange-2);
            border: 1px solid rgba(255,150,45,0.12);
            background: transparent;
        }

        /* Table visibility */
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        thead th {
            text-align: left; padding: .9rem; font-weight: 700;
            background: linear-gradient(90deg, rgba(255,110,34,0.12), rgba(255,86,24,0.06));
            color: #fff;
        }
        tbody td { padding: .8rem; border-top: 1px solid rgba(255,255,255,0.03); color: var(--text); }

        /* Accessibility helpers */
        a:focus, button:focus { outline: 3px solid rgba(255,140,23,0.18); outline-offset: 2px; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

        .small-glow { text-shadow: 0 0 10px rgba(255,140,30,0.28); }
        .neon-title { color: #fff2d9; text-shadow: 0 0 6px #ffd18a, 0 0 18px #ff8d2a; }
    </style>
</head>
<body>
    <header class="navbar text-white p-4 backdrop-blur-md">
        <div class="container mx-auto flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center space-x-2">
                <i class="fas fa-rocket text-2xl text-orange-300" aria-hidden="true"></i>
                <span class="text-2xl font-bold small-glow">Gestion Étudiants</span>
            </div>
            <nav class="flex flex-wrap items-center gap-3">
                <a href="/" class="nav-link rounded px-3 py-1"> <i class="fas fa-home"></i> Accueil</a>
                <a href="/enregistrer" class="nav-link rounded px-3 py-1"> <i class="fas fa-user-plus"></i> Enregistrer</a>
                <a href="/liste" class="nav-link rounded px-3 py-1"> <i class="fas fa-list"></i> Liste</a>
            </nav>
        </div>
    </header>

        <main class="container mx-auto p-6">
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="max-w-4xl mx-auto mt-4">
                            {% for msg in messages %}
                                <div class="p-3 mb-2 rounded-lg bg-green-600/20 text-green-200 border border-green-600/30">{{ msg }}</div>
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}

                {% block content %}{% endblock %}
        </main>

    <footer class="text-center py-4 text-sm text-gray-400">
        © 2026 - Application de gestion des étudiants
    </footer>
</body>
</html>
